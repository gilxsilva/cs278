<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpotMap Pin Icons</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 48px;
      padding: 48px 24px;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #64748b;
    }

    .row {
      display: flex;
      gap: 36px;
      align-items: flex-end;
    }

    .pin-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* SVG drop-shadow is baked into each file; no extra CSS shadow needed */
    .pin-item img {
      width: 52px;
      height: 52px;
      display: block;
    }

    .pin-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #475569;
    }

    /* Larger "selected" demo state */
    .pin-item.selected img {
      width: 64px;
      height: 64px;
    }

    /* Size comparison row */
    .sizes {
      display: flex;
      gap: 20px;
      align-items: flex-end;
    }
    .sizes img { display: block; }
    .size-s  { width: 32px;  height: 32px; }
    .size-m  { width: 44px;  height: 44px; }
    .size-l  { width: 52px;  height: 52px; }
    .size-xl { width: 64px;  height: 64px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #94a3b8;
      align-self: flex-start;
    }
  </style>
</head>
<body>

  <h1>SpotMap — Map Pin Icons</h1>

  <!-- All five icons -->
  <div class="row">
    <div class="pin-item">
      <img src="pin-library.svg"  alt="Library"/>
      <span class="pin-label" style="color:#534AB7">Library</span>
    </div>
    <div class="pin-item">
      <img src="pin-gaming.svg"   alt="Gaming"/>
      <span class="pin-label" style="color:#D85A30">Gaming</span>
    </div>
    <div class="pin-item">
      <img src="pin-cafe.svg"     alt="Café"/>
      <span class="pin-label" style="color:#0F6E56">Café</span>
    </div>
    <div class="pin-item">
      <img src="pin-shop.svg"     alt="Shop"/>
      <span class="pin-label" style="color:#185FA5">Shop</span>
    </div>
    <div class="pin-item">
      <img src="pin-landmark.svg" alt="Landmark"/>
      <span class="pin-label" style="color:#854F0B">Landmark</span>
    </div>
  </div>

  <!-- Size scale demo -->
  <span class="section-label">Scale reference</span>
  <div class="sizes">
    <img src="pin-cafe.svg" class="size-s"  alt="32px"/>
    <img src="pin-cafe.svg" class="size-m"  alt="44px"/>
    <img src="pin-cafe.svg" class="size-l"  alt="52px"/>
    <img src="pin-cafe.svg" class="size-xl" alt="64px"/>
  </div>

</body>
</html>
