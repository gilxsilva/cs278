<?xml version="1.0" encoding="UTF-8"?>
<svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-15" y="-15" width="82" height="82" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- White circle -->
  <circle cx="26" cy="26" r="24" fill="white" stroke="#000000" stroke-opacity="0.10" stroke-width="1" filter="url(#shadow)"/>
  <!-- Base platform -->
  <line x1="13" y1="38" x2="39" y2="38" stroke="#854F0B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tower legs -->
  <line x1="16" y1="38" x2="20" y2="23" stroke="#854F0B" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="36" y1="38" x2="32" y2="23" stroke="#854F0B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Mid-tower horizontal band -->
  <line x1="17.5" y1="31" x2="34.5" y2="31" stroke="#854F0B" stroke-width="2" stroke-linecap="round"/>
  <!-- Observation deck top bar -->
  <line x1="19" y1="23" x2="33" y2="23" stroke="#854F0B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Cabin / top box -->
  <rect x="21" y="14" width="10" height="10" rx="1.5"
        stroke="#854F0B" stroke-width="2.2"/>
  <!-- Pointed roof -->
  <path d="M21 14 L26 9 L31 14"
        stroke="#854F0B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cabin window -->
  <circle cx="26" cy="19" r="2" stroke="#854F0B" stroke-width="1.8"/>
</svg>
